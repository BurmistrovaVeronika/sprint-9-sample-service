apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Chart.Name }}
  namespace: st-k8s260709e72fe3
  labels:
    app: {{ .Chart.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Chart.Name }}
  template:
    metadata:
      labels:
        app: {{ .Chart.Name }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: {{ .Chart.Name }}-config
          volumeMounts:
            - name: kafka-certs
              mountPath: /usr/local/share/ca-certificates/Yandex
      volumes:
        - name: kafka-certs
          configMap:
            name: kafka-certs
      imagePullSecrets:
        - name: yandex-registry
